services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: always

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
    env_file:
      - ./client/.env
    depends_on:
      - backend
    restart: always
