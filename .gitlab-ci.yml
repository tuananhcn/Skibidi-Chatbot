image: node:20-alpine

variables:
  PNPM_CACHE_DIR: .pnpm-store
  DOCKER_IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_SLUG
  DOCKER_IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_SLUG

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store
    - node_modules/

stages:
  - install
  - lint
  - build_docker
  - deploy

install_dependencies:
  stage: install
  image: node:20-slim
  script:
    - corepack enable
    - pnpm install --no-frozen-lockfile
  artifacts:
    paths:
      - node_modules/

linting:
  stage: lint
  image: node:20-slim
  script:
    - corepack enable
    - pnpm lint
  dependencies:
    - install_dependencies

build_images:
  stage: build_docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --target backend -t $DOCKER_IMAGE_BACKEND .
    - docker build --target frontend -t $DOCKER_IMAGE_FRONTEND .
    - docker push $DOCKER_IMAGE_BACKEND
    - docker push $DOCKER_IMAGE_FRONTEND
  only:
    - develop
    - main

deploy_to_server:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh $SERVER_USER@$SERVER_IP "cd /app/chatbot && docker compose pull && docker compose up -d"
  only:
    - develop
